name: Nightly Cleanup

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Nightly
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: nightly-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    name: Keep last 9 nightly releases
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    env:
      KEEP_NIGHTLY_RELEASES: 9

    steps:
      - name: Delete old nightly releases and tags
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          mapfile -t old_tags < <(
            gh release list \
              --repo "$REPO" \
              --limit 1000 \
              --json tagName,createdAt \
              --jq "[.[] | select(.tagName | contains(\"_nightly_\"))]
                    | sort_by(.createdAt)
                    | reverse
                    | .[$KEEP_NIGHTLY_RELEASES:]
                    | .[].tagName"
          )

          if [[ ${#old_tags[@]} -eq 0 ]]; then
            echo "No old nightly releases to delete."
            exit 0
          fi

          for tag in "${old_tags[@]}"; do
            echo "Deleting old nightly release and tag: $tag"
            gh release delete "$tag" --repo "$REPO" --yes --cleanup-tag
          done
