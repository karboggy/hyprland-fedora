name: Nightly Cleanup

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Nightly
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: nightly-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    name: Keep last 9 nightly releases
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    env:
      KEEP_NIGHTLY: 9

    steps:
      - name: Delete old nightly releases and tags
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          mapfile -t old_release_tags < <(
            gh release list \
              --repo "$REPO" \
              --limit 1000 \
              --json tagName \
              --jq "def is_nightly_tag:
                      (
                        contains(\"_nightly_\") or
                        test(\"^[0-9]{4}-[0-9]{2}-[0-9]{2}_hyprland-\")
                      ) and
                      (contains(\"_stable_\") | not) and
                      (startswith(\"stable_\") | not);
                    [.[] | select(.tagName | is_nightly_tag)]
                    | sort_by(.tagName)
                    | reverse
                    | .[$KEEP_NIGHTLY:]
                    | .[].tagName"
          )

          if [[ ${#old_release_tags[@]} -eq 0 ]]; then
            echo "No old nightly releases to delete."
          else
            for tag in "${old_release_tags[@]}"; do
              echo "Deleting old nightly release and tag: $tag"
              gh release delete "$tag" --repo "$REPO" --yes --cleanup-tag
            done
          fi

          mapfile -t old_tags < <(
            gh api \
              --paginate \
              "repos/$REPO/git/matching-refs/tags" \
              --jq "def is_nightly_tag:
                      (
                        contains(\"_nightly_\") or
                        test(\"^[0-9]{4}-[0-9]{2}-[0-9]{2}_hyprland-\")
                      ) and
                      (contains(\"_stable_\") | not) and
                      (startswith(\"stable_\") | not);
                    [.[] | .ref | ltrimstr(\"refs/tags/\") | select(is_nightly_tag)]
                    | sort
                    | reverse
                    | .[$KEEP_NIGHTLY:]
                    | .[]"
          )

          if [[ ${#old_tags[@]} -eq 0 ]]; then
            echo "No old nightly tags to delete."
          else
            for tag in "${old_tags[@]}"; do
              echo "Deleting old nightly tag: $tag"
              gh api --method DELETE "repos/$REPO/git/refs/tags/$tag"
            done
          fi
