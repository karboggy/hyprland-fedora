name: Nightly Cleanup

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Nightly
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: nightly-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    name: Keep latest nightly release per Fedora version
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    env:
      KEEP_NIGHTLY: 1

    steps:
      - name: Delete old nightly releases and tags
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          cleanup_fedora() {
            local fedora_version="$1"
            local release_filter
            local tag_filter

            release_filter="contains(\"_fedora${fedora_version}_nightly_\")"
            tag_filter="$release_filter"

            if [[ "$fedora_version" == "43" ]]; then
              release_filter="($release_filter or contains(\"_nightly_hyprland-\") or test(\"^[0-9]{4}-[0-9]{2}-[0-9]{2}_hyprland-\"))"
              tag_filter="$release_filter"
            fi

            echo "Cleaning Fedora ${fedora_version} nightly releases, keeping ${KEEP_NIGHTLY}."

            mapfile -t old_release_tags < <(
              gh release list \
                --repo "$REPO" \
                --limit 1000 \
                --json tagName \
                --jq "[.[] | select(.tagName as \$tag | (\$tag | (${release_filter})) and ((\$tag | contains(\"_stable_\")) | not) and ((\$tag | startswith(\"stable_\")) | not))]
                      | sort_by(.tagName)
                      | reverse
                      | .[$KEEP_NIGHTLY:]
                      | .[].tagName"
            )

            if [[ ${#old_release_tags[@]} -eq 0 ]]; then
              echo "No old Fedora ${fedora_version} nightly releases to delete."
            else
              for tag in "${old_release_tags[@]}"; do
                echo "Deleting old Fedora ${fedora_version} nightly release and tag: $tag"
                gh release delete "$tag" --repo "$REPO" --yes --cleanup-tag
              done
            fi

            mapfile -t old_tags < <(
              gh api \
                --paginate \
                "repos/$REPO/git/matching-refs/tags" \
                --jq "[.[] | .ref | ltrimstr(\"refs/tags/\") | select(. as \$tag | (\$tag | (${tag_filter})) and ((\$tag | contains(\"_stable_\")) | not) and ((\$tag | startswith(\"stable_\")) | not))]
                      | sort
                      | reverse
                      | .[$KEEP_NIGHTLY:]
                      | .[]"
            )

            if [[ ${#old_tags[@]} -eq 0 ]]; then
              echo "No old Fedora ${fedora_version} nightly tags to delete."
            else
              for tag in "${old_tags[@]}"; do
                echo "Deleting old Fedora ${fedora_version} nightly tag: $tag"
                gh api --method DELETE "repos/$REPO/git/refs/tags/$tag"
              done
            fi
          }

          cleanup_fedora 43
          cleanup_fedora 44
